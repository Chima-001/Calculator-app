<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
<link rel="stylesheet" href="assets/css/calculator.css">

</head>
<body>
    <div class="calculator">
      <input id="display" type="text" readonly placeholder="0" aria-label="Calculator display">
      <div class="buttons-grid">
        <button class="btn-clear" onclick="clearDisplay()" aria-label="Clear">AC</button>
        <button class="btn-del" onclick="deleteValue()" aria-label="Delete">⌫</button>
        <button class="btn-op" onclick="key('/')" aria-label="Divide">÷</button>
        <button class="btn-op" onclick="key('*')" aria-label="Multiply">×</button>
        <button class="btn-num" onclick="key('7')" aria-label="7">7</button>
        <button class="btn-num" onclick="key('8')" aria-label="8">8</button>
        <button class="btn-num" onclick="key('9')" aria-label="9">9</button>
        <button class="btn-op" onclick="key('-')" aria-label="Subtract">-</button>
        <button class="btn-num" onclick="key('4')" aria-label="4">4</button>
        <button class="btn-num" onclick="key('5')" aria-label="5">5</button>
        <button class="btn-num" onclick="key('6')" aria-label="6">6</button>
        <button class="btn-op" onclick="key('+')" aria-label="Add">+</button>
        <button class="btn-num" onclick="key('1')" aria-label="1">1</button>
        <button class="btn-num" onclick="key('2')" aria-label="2">2</button>
        <button class="btn-num" onclick="key('3')" aria-label="3">3</button>
        <button class="btn-op percent-btn" onclick="calculatePercentage('%')" aria-label="Percent">%</button>
        <button class="btn-num span-two" onclick="key('0')" aria-label="0">0</button>
        <button class="btn-num" onclick="key('.')" aria-label="Decimal">.</button>
        <button class="btn-eq" onclick="calculate()" aria-label="Equals" style="grid-row: span 2; grid-column: 4;">=</button>
      </div>
    </div>
    
<script src="assets/js/calculator.js"></script>

</body>
</html>
