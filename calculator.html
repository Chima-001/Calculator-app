<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="calculator.css">
</head>
<body>
    <div>
    <input id="display" type="text" readonly value="0">
    </div>
        <div>
        <div class="inp" >
                <button class="kays" onclick="key('+')">+</button>
                <button class="keys" onclick="key('7')">7</button>
                <button class="keys" onclick="key('8')">8</button>
                <button class="keys" onclick="key('9')">9</button><br>
                <button class="kays" onclick="key('-')">-</button>
                <button class="keys" onclick="key('4')">4</button>
                <button class="keys" onclick="key('5')">5</button>
                <button class="keys" onclick="key('6')">6</button><br>
                <button class="kays" onclick="key('*')">ˣ</button>
                <button class="keys" onclick="key('1')">1</button>
                <button class="keys" onclick="key('2')">2</button>
                <button class="keys" onclick="key('3')">3</button><br>
                <button class="kays" onclick="key('/')">÷</button>
                <button class="keys" onclick="calculatePercentage('%')">%</button>
                <button class="keys" onclick="key('0')">0</button>
                <button class="keys" onclick="key('.')">.</button><br>
                <div class="alig">
                <button class="keays" onclick="clearDisplay()">C</button>
                <button class="equal" onclick="calculate()">=</button>
                <button class="keays" onclick="deleteValue()">⬅</button>
        </div>
    </div>
    
    <script src="calculator.js"></script>
</body>
</html>
